<!DOCTYPE html>
<html lang="es">
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#121014">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Instrument+Sans:wght@400..700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
  /* ============================================================
     Portal Docente — identidad visual de enavantescuela.com
     Fraunces + Instrument Sans · morado #A40FC4 · tinta #121014
     Diseñado para celular primero: los maestros lo usan en clase.
     ============================================================ */
  :root {
    --purple: #A40FC4;
    --purple-dark: #7B0B93;
    --teal: #037070;
    --ink: #121014;
    --ink-60: rgba(18,16,20,.6);
    --ink-40: rgba(18,16,20,.42);
    --paper: #FAF9F7;
    --white: #fff;
    --line: rgba(18,16,20,.13);
    --field: #F1EFED;
    --ok: #2E7D32;
    --no: #B3261E;
    --display: 'Fraunces', Georgia, serif;
    --body: 'Instrument Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
    --ease: cubic-bezier(.22,1,.36,1);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    font-family: var(--body);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
  }

  /* ================= LOGIN ================= */
  #login-view {
    position: fixed;
    inset: 0;
    z-index: 999;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 24px;
    background: var(--ink);
    overflow: hidden;
  }

  /* Resplandor de "luz de escenario", igual que en el sitio. */
  #login-view::before,
  #login-view::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
  }
  #login-view::before {
    width: 70vw; height: 70vw; max-width: 520px; max-height: 520px;
    left: -18%; top: -22%;
    background: radial-gradient(circle, rgba(164,15,196,.42), transparent 68%);
  }
  #login-view::after {
    width: 62vw; height: 62vw; max-width: 460px; max-height: 460px;
    right: -16%; bottom: -20%;
    background: radial-gradient(circle, rgba(3,112,112,.34), transparent 68%);
  }

  .login-card {
    position: relative;
    z-index: 1;
    background: var(--paper);
    padding: 40px 32px 34px;
    border-radius: 4px;
    width: 100%;
    max-width: 380px;
    text-align: center;
    box-shadow: 0 30px 70px -24px rgba(0,0,0,.7);
  }

  .logo-img { width: 116px; height: auto; margin: 0 auto 26px; display: block; }

  .login-card h1 {
    font-family: var(--display);
    font-weight: 400;
    font-size: 1.95rem;
    letter-spacing: -.02em;
    line-height: 1.1;
    margin: 0 0 8px;
  }
  .login-card h1 em { font-style: italic; color: var(--purple); }

  .login-card .sub {
    margin: 0 0 26px;
    font-size: .92rem;
    color: var(--ink-60);
  }

  /* ================= CAMPOS ================= */
  .field {
    width: 100%;
    height: 54px;
    padding: 0 16px;
    font-family: var(--body);
    font-size: 16px;           /* 16px evita que iOS haga zoom al enfocar */
    font-weight: 500;
    color: var(--ink);
    background: var(--field);
    border: 1.5px solid transparent;
    border-radius: 3px;
    outline: none;
    transition: border-color .25s var(--ease), background .25s var(--ease);
    -webkit-appearance: none;
    appearance: none;
  }
  .field::placeholder { color: var(--ink-40); font-weight: 400; }
  .field:focus {
    background: var(--white);
    border-color: var(--purple);
  }

  /* Oculta las flechitas del input numérico */
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }

  .btn {
    width: 100%;
    height: 54px;
    margin-top: 14px;
    font-family: var(--body);
    font-size: .82rem;
    font-weight: 600;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--paper);
    background: var(--ink);
    border: none;
    border-radius: 100px;
    cursor: pointer;
    transition: background .3s var(--ease), transform .2s var(--ease);
  }
  .btn:hover:not(:disabled) { background: var(--purple); }
  .btn:active:not(:disabled) { transform: scale(.985); }
  .btn:disabled { opacity: .5; cursor: default; }
  .btn:focus-visible, .field:focus-visible { outline: 2px solid var(--purple); outline-offset: 2px; }

  /* ================= APP ================= */
  #app-view { display: none; padding-bottom: 48px; }

  .header {
    background: var(--ink);
    color: var(--paper);
    padding: 16px 20px;
    padding-top: calc(16px + env(safe-area-inset-top));
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header .nombre {
    font-family: var(--display);
    font-weight: 400;
    font-size: 1.15rem;
    letter-spacing: -.01em;
    line-height: 1.25;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .header .rol {
    display: block;
    font-size: .64rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: rgba(250,249,247,.55);
    margin-top: 3px;
  }
  .logout-btn {
    flex-shrink: 0;
    width: 42px; height: 42px;
    display: grid;
    place-items: center;
    background: transparent;
    border: 1px solid rgba(250,249,247,.28);
    border-radius: 50%;
    color: var(--paper);
    cursor: pointer;
    transition: background .25s var(--ease), border-color .25s var(--ease);
  }
  .logout-btn:hover { background: rgba(250,249,247,.12); border-color: rgba(250,249,247,.5); }
  .logout-btn svg { width: 17px; height: 17px; }

  .controls {
    display: flex;
    gap: 12px;
    padding: 20px 16px 6px;
  }
  .input-group { flex: 1; min-width: 0; }
  .input-group label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: .64rem;
    font-weight: 600;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 8px;
  }
  .input-group label svg { width: 12px; height: 12px; flex-shrink: 0; }

  select.field {
    padding-right: 34px;
    background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8'%3E%3Cpath fill='none' stroke='%23A40FC4' stroke-width='1.6' d='M1 1.5 6 6.5l5-5'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 14px center;
    background-size: 11px auto;
    text-overflow: ellipsis;
  }
  select.field:disabled {
    background-image: none;
    padding-right: 16px;
    color: var(--ink);
    -webkit-text-fill-color: var(--ink);
    opacity: 1;
  }
  input[type=date].field { font-weight: 500; }

  /* ================= LISTA ================= */
  .student-list { padding: 14px 16px 0; }

  .list-count {
    font-size: .68rem;
    font-weight: 600;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--ink-40);
    padding: 0 2px 12px;
  }

  .student-card {
    background: var(--white);
    border: 1px solid var(--line);
    border-left: 3px solid var(--purple);
    border-radius: 3px;
    padding: 18px;
    margin-bottom: 12px;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 10px;
  }
  .time-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: .74rem;
    font-weight: 700;
    letter-spacing: .04em;
    color: var(--purple-dark);
    white-space: nowrap;
  }
  .time-badge svg { width: 12px; height: 12px; }
  .modalidad-text {
    font-size: .68rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink-40);
    text-align: right;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 52%;
  }

  .student-name {
    font-family: var(--display);
    font-weight: 500;
    font-size: 1.22rem;
    letter-spacing: -.015em;
    line-height: 1.25;
    margin-bottom: 3px;
  }
  .details { font-size: .86rem; color: var(--ink-60); margin-bottom: 16px; }

  /* Botones Sí / No */
  .radio-group {
    display: flex;
    gap: 8px;
  }
  .radio-option { flex: 1; }
  .radio-option input { position: absolute; opacity: 0; pointer-events: none; }

  .radio-option label {
    display: block;
    height: 48px;
    line-height: 46px;
    text-align: center;
    border: 1.5px solid var(--line);
    border-radius: 100px;
    font-size: .78rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ink-60);
    background: var(--white);
    cursor: pointer;
    transition: all .25s var(--ease);
    -webkit-tap-highlight-color: transparent;
  }
  .radio-option label:active { transform: scale(.97); }

  input[value="Si"]:checked + label {
    background: var(--ok); border-color: var(--ok); color: #fff;
  }
  input[value="No"]:checked + label {
    background: var(--no); border-color: var(--no); color: #fff;
  }
  .radio-option input:focus-visible + label { outline: 2px solid var(--purple); outline-offset: 2px; }
  .radio-option input:disabled + label { opacity: .5; cursor: default; }

  /* ================= ESTADOS ================= */
  .empty-state {
    text-align: center;
    color: var(--ink-40);
    padding: 54px 24px;
    font-size: .94rem;
  }
  .empty-state svg { width: 40px; height: 40px; margin-bottom: 16px; opacity: .38; }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(250,249,247,.86);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 200;
  }
  .spinner {
    width: 34px; height: 34px;
    border: 2px solid var(--line);
    border-top-color: var(--purple);
    border-radius: 50%;
    animation: giro .8s linear infinite;
  }
  @keyframes giro { to { transform: rotate(360deg); } }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: .01ms !important; transition-duration: .01ms !important; }
  }

  /* Pantallas grandes: se centra, no se estira. */
  @media (min-width: 720px) {
    .header { padding-left: 32px; padding-right: 32px; }
    .controls, .student-list { max-width: 680px; margin-left: auto; margin-right: auto; }
  }
</style>
</head>
<body>

  <div class="loading-overlay" id="loader"><div class="spinner"></div></div>

  <!-- ================= LOGIN ================= -->
  <div id="login-view">
    <div class="login-card">
      <!-- Logo servido desde el sitio propio, NO desde Wix. -->
      <img src="https://www.enavantescuela.com/img/logo-en-avant.png" alt="En Avant" class="logo-img">
      <h1>Portal <em>Docente</em></h1>
      <p class="sub">Ingresa tu cédula para continuar</p>
      <input type="number" id="cedulaInput" class="field" placeholder="Número de documento"
             inputmode="numeric" autocomplete="off">
      <button class="btn" id="btnLogin">Ingresar</button>
    </div>
  </div>

  <!-- ================= APP ================= -->
  <div id="app-view">
    <div class="header">
      <div style="min-width:0">
        <div class="nombre" id="displayNombre">Cargando…</div>
        <span class="rol">Docente En Avant</span>
      </div>
      <button class="logout-btn" id="btnLogout" aria-label="Cerrar sesión" title="Cerrar sesión">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/>
        </svg>
      </button>
    </div>

    <div class="controls">
      <div class="input-group">
        <label for="sedeSelect">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>
          </svg>
          Sede
        </label>
        <select id="sedeSelect" class="field"></select>
      </div>
      <div class="input-group">
        <label for="dateInput">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
          </svg>
          Fecha
        </label>
        <input type="date" id="dateInput" class="field">
      </div>
    </div>

    <div class="student-list" id="listaEstudiantes">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
        </svg>
        <div>Selecciona una sede y una fecha<br>para ver tus clases.</div>
      </div>
    </div>
  </div>

<script>
  var CLAVE_SESION = 'usuarioEnAvant';
  var currentUser = {};

  /* ---------- Utilidades ---------- */

  // Escapa texto antes de meterlo en HTML. Sin esto, un nombre con
  // "<" o "&" rompe la tarjeta del estudiante.
  function esc(txt) {
    return String(txt == null ? '' : txt)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function mostrarCarga(show) {
    document.getElementById('loader').style.display = show ? 'flex' : 'none';
  }

  function errorGrave(msg) {
    mostrarCarga(false);
    Swal.fire({
      icon: 'error',
      title: 'Sin conexión',
      text: msg || 'No pudimos conectar con el servidor. Revisa tu internet e intenta de nuevo.',
      confirmButtonColor: '#A40FC4'
    });
  }

  function avisar(icono, titulo, texto) {
    Swal.fire({ icon: icono, title: titulo, text: texto, confirmButtonColor: '#A40FC4' });
  }

  // Comprueba que una sesión guardada tenga la forma esperada.
  // Si quedó una sesión vieja o incompleta, la app arrancaba rota.
  function sesionValida(u) {
    return u && typeof u.nombre === 'string' && u.nombre !== '' &&
           Object.prototype.toString.call(u.sedes) === '[object Array]' &&
           u.sedes.length > 0;
  }

  function limpiarSesion() {
    try { localStorage.removeItem(CLAVE_SESION); } catch (e) {}
  }

  function vacio(mensaje) {
    return '<div class="empty-state"><div>' + esc(mensaje) + '</div></div>';
  }

  /* ---------- Arranque ---------- */

  window.addEventListener('load', function () {
    document.getElementById('dateInput').valueAsDate = new Date();

    document.getElementById('btnLogin').addEventListener('click', handleLogin);
    document.getElementById('btnLogout').addEventListener('click', logout);
    document.getElementById('sedeSelect').addEventListener('change', cargarClases);
    document.getElementById('dateInput').addEventListener('change', cargarClases);

    document.getElementById('cedulaInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') handleLogin();
    });

    var guardado = null;
    try { guardado = JSON.parse(localStorage.getItem(CLAVE_SESION)); } catch (e) { guardado = null; }

    if (sesionValida(guardado)) {
      currentUser = guardado;
      mostrarApp();
    } else {
      limpiarSesion();   // sesión corrupta: se descarta y se pide login
    }
  });

  /* ---------- Login ---------- */

  function handleLogin() {
    var cedula = document.getElementById('cedulaInput').value;
    if (!cedula) return avisar('warning', 'Falta tu cédula', 'Digita tu número de documento.');

    var btn = document.getElementById('btnLogin');
    btn.disabled = true;
    mostrarCarga(true);

    google.script.run
      .withSuccessHandler(function (res) {
        btn.disabled = false;
        mostrarCarga(false);
        if (res && res.success) {
          currentUser = { cedula: cedula, nombre: res.nombre, sedes: res.sedes };
          try { localStorage.setItem(CLAVE_SESION, JSON.stringify(currentUser)); } catch (e) {}
          mostrarApp();
        } else {
          avisar('error', 'No pudimos entrar', (res && res.message) || 'Revisa tu número de documento.');
        }
      })
      .withFailureHandler(function (err) {
        btn.disabled = false;
        errorGrave(err && err.message);
      })
      .loginMaestro(cedula);
  }

  function mostrarApp() {
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('app-view').style.display = 'block';
    document.getElementById('displayNombre').innerText = currentUser.nombre;

    var select = document.getElementById('sedeSelect');
    select.innerHTML = '';
    currentUser.sedes.forEach(function (sede) {
      var opt = document.createElement('option');
      opt.value = sede;
      opt.innerText = sede;
      select.appendChild(opt);
    });

    // Con una sola sede el desplegable se bloquea; el CSS le quita la flecha.
    select.disabled = (currentUser.sedes.length === 1);

    cargarClases();
  }

  function logout() {
    limpiarSesion();
    currentUser = {};
    document.getElementById('cedulaInput').value = '';
    document.getElementById('listaEstudiantes').innerHTML = '';
    document.getElementById('app-view').style.display = 'none';
    document.getElementById('login-view').style.display = 'flex';
  }

  /* ---------- Clases ---------- */

  function cargarClases() {
    var sede = document.getElementById('sedeSelect').value;
    var fecha = document.getElementById('dateInput').value;
    var contenedor = document.getElementById('listaEstudiantes');

    if (!sede || !fecha) {
      contenedor.innerHTML = vacio('Selecciona una sede y una fecha para ver tus clases.');
      return;
    }

    mostrarCarga(true);
    contenedor.innerHTML = '';

    google.script.run
      .withSuccessHandler(function (res) {
        mostrarCarga(false);
        if (res && res.success) {
          if (!res.clases.length) {
            contenedor.innerHTML = vacio('No tienes clases programadas para esta fecha.');
            return;
          }
          renderizarEstudiantes(res.clases, sede);
        } else {
          contenedor.innerHTML = vacio('No pudimos cargar tus clases.');
          avisar('error', 'Error', (res && res.message) || 'No pudimos cargar tus clases.');
        }
      })
      .withFailureHandler(function (err) {
        // Sin esto el spinner giraba para siempre y el maestro no sabía qué pasaba.
        contenedor.innerHTML = vacio('No pudimos cargar tus clases.');
        errorGrave(err && err.message);
      })
      .obtenerClases(sede, currentUser.nombre, fecha);
  }

  function renderizarEstudiantes(clases, sede) {
    var contenedor = document.getElementById('listaEstudiantes');
    contenedor.innerHTML = '';

    var conteo = document.createElement('div');
    conteo.className = 'list-count';
    conteo.textContent = clases.length + (clases.length === 1 ? ' estudiante' : ' estudiantes');
    contenedor.appendChild(conteo);

    var reloj = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" ' +
                'stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/>' +
                '<path d="M12 7v5l3 2"/></svg>';

    clases.forEach(function (clase, index) {
      var uniqueId = 'row-' + index;
      var card = document.createElement('div');
      card.className = 'student-card';
      card.innerHTML =
        '<div class="card-header">' +
          '<span class="time-badge">' + reloj + esc(clase.horario) + '</span>' +
          '<span class="modalidad-text">' + esc(clase.modalidad) + '</span>' +
        '</div>' +
        '<div class="student-name">' + esc(clase.estudiante) + '</div>' +
        '<div class="details">' + esc(clase.programa) + '</div>' +
        '<div class="radio-group">' +
          generarOpcion(uniqueId, 'Si', clase.asistencia) +
          generarOpcion(uniqueId, 'No', clase.asistencia) +
        '</div>';

      var radios = card.querySelectorAll('input[name="' + uniqueId + '"]');
      Array.prototype.forEach.call(radios, function (radio) {
        radio.addEventListener('change', function () {
          guardarCambio(this.value, clase, sede, radios);
        });
      });

      contenedor.appendChild(card);
    });
  }

  function generarOpcion(name, val, actual) {
    var isChecked = String(actual).toLowerCase() === String(val).toLowerCase() ? 'checked' : '';
    var texto = val === 'Si' ? 'Asistió' : 'No asistió';
    return '<div class="radio-option">' +
             '<input type="radio" id="' + name + '-' + val + '" name="' + name + '" value="' + val + '" ' + isChecked + '>' +
             '<label for="' + name + '-' + val + '">' + texto + '</label>' +
           '</div>';
  }

  /* ---------- Guardar ---------- */

  function guardarCambio(nuevoValor, claseObj, sede, radios) {
    var Toast = Swal.mixin({
      toast: true, position: 'top-end', showConfirmButton: false,
      timer: 1300, timerProgressBar: true
    });
    var anterior = claseObj.asistencia;

    // Se bloquean los botones de esa tarjeta mientras guarda.
    Array.prototype.forEach.call(radios, function (r) { r.disabled = true; });

    function desbloquear() {
      Array.prototype.forEach.call(radios, function (r) { r.disabled = false; });
    }

    // Si falla, se devuelve el botón a como estaba para no mostrar
    // una asistencia que en realidad no se guardó.
    function revertir() {
      claseObj.asistencia = anterior;
      Array.prototype.forEach.call(radios, function (r) {
        r.checked = (String(r.value).toLowerCase() === String(anterior).toLowerCase());
      });
    }

    google.script.run
      .withSuccessHandler(function (res) {
        desbloquear();
        if (res && res.success) {
          claseObj.asistencia = nuevoValor;
          Toast.fire({ icon: 'success', title: 'Guardado' });
        } else {
          revertir();
          avisar('error', 'No se guardó', (res && res.message) || 'Intenta de nuevo.');
        }
      })
      .withFailureHandler(function (err) {
        desbloquear();
        revertir();
        errorGrave(err && err.message);
      })
      .guardarAsistencia(sede, claseObj.fila, nuevoValor, {
        idEst: claseObj.idEst,
        programa: claseObj.programa
      });
  }
</script>
</body>
