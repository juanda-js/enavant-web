<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<title>Portal Maestros | En Avant</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#121014">

<!-- Permite "Añadir a pantalla de inicio" en iPhone/iPad y Android -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Portal Docente">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="img/favicon.png">
<link rel="icon" href="img/favicon.png">

<style>
/* ============================================================
   Portal Maestros — contenedor del app de Apps Script.
   ------------------------------------------------------------
   El iframe se sube para dejar fuera de vista la barra de aviso
   que Google añade a las apps de Apps Script. Esa barra vive en
   el documento de Google (otro dominio), así que no se puede
   ocultar con CSS: solo se puede desplazar fuera del recorte.

   --corte  = cuántos píxeles se suben.
   Si algún día se ve un pedazo del aviso, sube el número.
   Si se ve cortado el encabezado del portal, bájalo.
   En pantallas angostas el aviso ocupa dos líneas, por eso el
   valor es mayor en el media query de abajo.
   ============================================================ */
:root { --corte: 46px; }

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  overflow: hidden;              /* nada de doble barra de scroll */
  background: #121014;           /* mismo tinta del portal, evita destellos blancos */
  overscroll-behavior: none;     /* sin "rebote" al arrastrar en el celular */
}

#marco {
  position: fixed;
  inset: 0;
  overflow: hidden;              /* aquí es donde se recorta */
}

#portal {
  position: absolute;
  left: 0;
  top: calc(var(--corte) * -1);
  width: 100%;
  height: calc(100% + var(--corte));
  border: 0;
  display: block;
  background: #121014;
}

/* Pantalla de carga mientras responde Google */
#cargando {
  position: fixed;
  inset: 0;
  z-index: 5;
  display: grid;
  place-items: center;
  background: #121014;
  transition: opacity .45s ease, visibility .45s ease;
}
#cargando.oculto { opacity: 0; visibility: hidden; }

#cargando .spin {
  width: 34px; height: 34px;
  border: 2px solid rgba(250,249,247,.22);
  border-top-color: #A40FC4;
  border-radius: 50%;
  animation: giro .8s linear infinite;
}
@keyframes giro { to { transform: rotate(360deg); } }

/* Salida de emergencia si el iframe no carga */
#respaldo {
  position: fixed;
  left: 50%; bottom: 24px;
  transform: translateX(-50%);
  z-index: 6;
  display: none;
  padding: 12px 26px;
  border: 1px solid rgba(250,249,247,.4);
  border-radius: 100px;
  color: #FAF9F7;
  background: rgba(18,16,20,.9);
  font: 600 .78rem/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  letter-spacing: .1em;
  text-transform: uppercase;
  text-decoration: none;
}
#respaldo:hover { background: #A40FC4; border-color: #A40FC4; }

/* Celular: el aviso de Google se parte en dos líneas y ocupa más alto. */
@media (max-width: 760px) {
  :root { --corte: 74px; }
}
@media (max-width: 420px) {
  :root { --corte: 84px; }
}

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}
</style>
</head>
<body>

<div id="cargando"><div class="spin"></div></div>

<div id="marco">
  <iframe
    id="portal"
    title="Portal Docente En Avant"
    src="https://script.google.com/macros/s/AKfycbwBOfw_jFMlnt69z8Oiby4NcPDGoogY6XOZ3IksKAMGteNpxn7qMM9z5gZdUUBQiSqK/exec"
    allow="clipboard-write *"
    referrerpolicy="no-referrer-when-downgrade"></iframe>
</div>

<a id="respaldo"
   href="https://script.google.com/macros/s/AKfycbwBOfw_jFMlnt69z8Oiby4NcPDGoogY6XOZ3IksKAMGteNpxn7qMM9z5gZdUUBQiSqK/exec">
  Abrir en una pestaña nueva
</a>

<script>
/* ============================================================
   Si algún día cambia el despliegue de Apps Script, se cambia
   la URL en DOS lugares de este archivo: el src del iframe y
   el href del enlace de respaldo.
   OJO: la URL nunca debe llevar /u/1/ — ese segmento es el
   selector de cuenta de Google y da 404 a los demás usuarios.
   ============================================================ */
(function () {
  var marco = document.getElementById('portal');
  var cargando = document.getElementById('cargando');
  var respaldo = document.getElementById('respaldo');
  var listo = false;

  marco.addEventListener('load', function () {
    listo = true;
    cargando.classList.add('oculto');
  });

  // Si a los 12 s no cargó, se ofrece abrirlo directamente.
  setTimeout(function () {
    if (listo) return;
    cargando.classList.add('oculto');
    respaldo.style.display = 'block';
  }, 12000);
})();
</script>

</body>
</html>
