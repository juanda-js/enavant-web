<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Portal Maestros | En Avant</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="img/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<style>
:root{
  --purple:#A40FC4;--teal-deep:#037070;--ink:#121014;--ink-45:rgba(18,16,20,.6);
  --paper:#FAF9F7;--line:rgba(18,16,20,.14);
  --font-display:'Fraunces',Georgia,serif;--font-body:'Instrument Sans',Helvetica,sans-serif;
  --ease:cubic-bezier(.22,1,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--font-body);color:var(--ink);background:var(--paper);
  min-height:100vh;display:grid;place-items:center;padding:32px;line-height:1.6;
}
.box{max-width:520px;text-align:center}
.label{
  font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--teal-deep);font-weight:600;
}
h1{
  font-family:var(--font-display);font-weight:400;letter-spacing:-.02em;
  font-size:clamp(2rem,5vw,2.9rem);line-height:1.12;margin:16px 0 14px;
}
h1 em{font-style:italic;color:var(--purple)}
p{color:var(--ink-45);font-size:1rem;max-width:44ch;margin:0 auto}
.spinner{
  width:26px;height:26px;margin:30px auto 0;border-radius:50%;
  border:2px solid var(--line);border-top-color:var(--purple);
  animation:giro .8s linear infinite;
}
@keyframes giro{to{transform:rotate(360deg)}}
.btn{
  display:inline-block;margin-top:28px;font-size:.85rem;font-weight:600;
  text-decoration:none;background:var(--ink);color:var(--paper);
  border:1px solid var(--ink);border-radius:100px;padding:13px 30px;
  transition:all .3s var(--ease);
}
.btn:hover{background:var(--purple);border-color:var(--purple)}
.btn:focus-visible{outline:2px solid var(--purple);outline-offset:3px}
.volver{
  display:block;margin-top:22px;font-size:.82rem;color:var(--ink-45);
  text-decoration:none;
}
.volver:hover{color:var(--ink);text-decoration:underline}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important}
  .spinner{display:none}
}
</style>
</head>
<body>

<div class="box">
  <span class="label">En Avant</span>
  <h1>Portal <em>Maestros</em></h1>
  <p id="msg">Te estamos llevando al portal de asistencia…</p>

  <div class="spinner" id="spin" aria-hidden="true"></div>

  <a class="btn" id="ir" href="https://script.google.com/macros/s/AKfycbwBOfw_jFMlnt69z8Oiby4NcPDGoogY6XOZ3IksKAMGteNpxn7qMM9z5gZdUUBQiSqK/exec">Entrar al portal</a>

  <a class="volver" href="/">← Volver al sitio</a>
</div>

<script>
/* ============================================================
   Redirección al Portal Maestros (app de Apps Script).
   Esta página existe para que los maestros usen una dirección
   corta y estable: enavantescuela.com/maestros
   Si algún día cambia el despliegue de Apps Script, se cambia
   la URL AQUÍ (en el href de #ir) y nada más.
   OJO: la URL nunca debe llevar /u/1/ — ese segmento es el
   selector de cuenta de Google y da 404 a los demás usuarios.
   ============================================================ */
(function () {
  var destino = document.getElementById('ir').href;

  setTimeout(function () {
    location.replace(destino);
  }, 1200);

  // Si a los 6 s seguimos aquí, algo falló: mostrar el botón como salida.
  setTimeout(function () {
    var s = document.getElementById('spin');
    if (s) s.style.display = 'none';
    document.getElementById('msg').textContent =
      'Si el portal no abrió automáticamente, entra con el botón.';
  }, 6000);
})();
</script>

</body>
</html>
